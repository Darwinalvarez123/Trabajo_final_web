
services:
  postgres:
    image: postgres:16-alpine
    container_name: unimag_tienda_db
    environment:
      POSTGRES_DB: unimag_tienda
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: